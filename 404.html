<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found - Softcode Web Studio">
    <title>404 - Page Not Found | Softcode Web Studio</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4A9EFF;
            --secondary-color: #2E75B6;
            --dark-bg: #0A1628;
            --darker-bg: #060D1A;
            --card-bg: #0F1B2E;
            --text-white: #E8EEF7;
            --text-gray: #B0BEC5;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated background stars */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(2px 2px at 20% 30%, white, transparent),
                radial-gradient(2px 2px at 60% 70%, white, transparent),
                radial-gradient(1px 1px at 50% 50%, white, transparent),
                radial-gradient(2px 2px at 80% 20%, white, transparent);
            background-size: 200px 200px;
            animation: stars 20s linear infinite;
            opacity: 0.3;
            z-index: 0;
        }
        
        @keyframes stars {
            from { transform: translateY(0); }
            to { transform: translateY(-200px); }
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
        }
        
        .logo {
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .logo img {
            height: 80px;
            width: 80px;
            filter: drop-shadow(0 0 15px rgba(74, 158, 255, 0.5));
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .logo-text {
            text-align: left;
        }
        
        .logo-main {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary-color);
            letter-spacing: 1px;
        }
        
        .logo-sub {
            font-size: 10px;
            font-weight: 400;
            color: #8AB4F8;
            letter-spacing: 3px;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #4A9EFF 50%, #2E75B6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(74, 158, 255, 0.3);
            animation: glitch 2s infinite;
        }
        
        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-2px, 2px); }
            94% { transform: translate(2px, -2px); }
            96% { transform: translate(-2px, -2px); }
            98% { transform: translate(2px, 2px); }
        }
        
        .error-title {
            font-size: 32px;
            margin-bottom: 15px;
            color: var(--text-white);
        }
        
        .error-message {
            font-size: 18px;
            color: var(--text-gray);
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-block;
            padding: 14px 32px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4A9EFF 0%, #2E75B6 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(74, 158, 255, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 158, 255, 0.4);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--primary-color);
            border-color: var(--primary-color);
        }
        
        .btn-secondary:hover {
            background: rgba(74, 158, 255, 0.1);
        }
        
        .footer {
            position: absolute;
            bottom: 20px;
            color: var(--text-gray);
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .error-code {
                font-size: 80px;
            }
            
            .error-title {
                font-size: 24px;
            }
            
            .error-message {
                font-size: 16px;
            }
            
            .buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo">
            <img src="images/logo.png" alt="Softcode Web Studio Logo">
            <div class="logo-text">
                <div class="logo-main">Softcode</div>
                <div class="logo-sub">WEB STUDIO</div>
            </div>
        </a>
        
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            Oops! The page you're looking for seems to have vanished into the digital void. 
            Let's get you back on track.
        </p>
        
        <div class="buttons">
            <a href="index.html" class="btn btn-primary">🏠 Back to Home</a>
            <a href="contact.html" class="btn btn-secondary">📞 Contact Us</a>
        </div>
    </div>
    
    <div class="footer">
        &copy; 2026 Softcode Web Studio. All rights reserved.
    </div>
    
    <script>
        // Track 404 errors (optional - for analytics)
        console.log('404 Error: ' + window.location.pathname);
        
        // Add animation on load
        document.addEventListener('DOMContentLoaded', function() {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease';
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 100);
        });
    </script>
</body>
<!-- Preloader -->
<div id="preloader">
    <div class="preloader-content">
        <div class="preloader-logo">
            <img src="images/logo.png" alt="Softcode Web Studio">
        </div>
        <div class="preloader-text">
            <span class="loading-text">Loading</span>
            <span class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>
</div>
</html>
